<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOSHI-3 — Repository Metrics</title>
  <link rel="icon" type="image/png" href="/images/yoshi_egg.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <button
    type="button"
    id="params-toggle-btn"
    class="params-toggle-btn"
    aria-label="Toggle parameters menu"
    aria-controls="params-drawer"
    aria-expanded="false"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <aside id="params-drawer" class="params-drawer" aria-hidden="true">
    <h2>Advanced Parameters</h2>
    <div class="form-group">
      <label for="min-commits">Min Commits</label>
      <input type="number" id="min-commits" min="0" step="1" value="100" />
    </div>
    <div class="form-group">
      <label for="days">Days</label>
      <input type="number" id="days" min="0" step="1" value="90" />
    </div>
    <div class="form-group">
      <label for="min-active">Min Active</label>
      <input type="number" id="min-active" min="0" step="1" value="3" />
    </div>
  </aside>
  <div id="params-overlay" class="params-overlay hidden" aria-hidden="true"></div>

  <header>
    <div class="header-bar">
      <a href="/" class="home-btn" id="home-btn">
        <img src="/images/yoshi_egg.png" alt="Home" />
      </a>
      <div class="header-text">
        <h1>YOSHI-3</h1>
        <span class="subtitle">Yielding Open-Source Health Information</span>
      </div>
      <div class="requests-widget" aria-live="polite">
        <span class="requests-label">Remaining requests</span>
        <span class="requests-value" id="remaining-requests">--</span>
      </div>
    </div>
  </header>

  <!-- Audio elements -->
  <audio id="sound-home" src="/audio/yoshi_home.mp3" preload="auto"></audio>
  <audio id="sound-enter" src="/audio/yoshi_enter.mp3" preload="auto"></audio>
  <audio id="sound-error" src="/audio/yoshi_error.mp3" preload="auto"></audio>

  <main>
    <!-- Input Card -->
    <section class="card input-card">
      <h2>Analyze a Repository</h2>
      <form id="process-form">
        <div class="form-group">
          <label for="owner">Owner</label>
          <input
            type="text"
            id="owner"
            name="owner"
            placeholder="e.g. traefik"
            required
          />
        </div>
        <div class="form-group">
          <label for="repo">Repository</label>
          <input
            type="text"
            id="repo"
            name="repo"
            placeholder="e.g. traefik"
            required
          />
        </div>
        <button type="submit" id="submit-btn">
          <span class="btn-text">Process</span>
          <span class="spinner hidden"></span>
        </button>
      </form>
    </section>

    <!-- Results Card (hidden until response) -->
    <section class="card results-card hidden" id="results-card">
      <h2>Results</h2>
      <div class="metrics">
        <div class="metric">
          <span class="metric-label">Formality</span>
          <div class="bar-wrapper">
            <div class="bar" id="bar-formality"></div>
          </div>
          <span class="metric-value" id="val-formality">—</span>
        </div>
        <div class="metric">
          <span class="metric-label">Geodispersion</span>
          <div class="bar-wrapper">
            <div class="bar" id="bar-geodispersion"></div>
          </div>
          <span class="metric-value" id="val-geodispersion">—</span>
        </div>
        <div class="metric">
          <span class="metric-label">Longevity</span>
          <div class="bar-wrapper">
            <div class="bar" id="bar-longevity"></div>
          </div>
          <span class="metric-value" id="val-longevity">—</span>
        </div>
        <div class="metric">
          <span class="metric-label">Cohesion</span>
          <div class="bar-wrapper">
            <div class="bar" id="bar-cohesion"></div>
          </div>
          <span class="metric-value" id="val-cohesion">—</span>
        </div>
      </div>
    </section>

    <!-- Error Banner (hidden until error) -->
    <section class="card error-card hidden" id="error-card">
      <p id="error-message"></p>
    </section>
  </main>

  <footer>
    <p>YOSHI-3 &mdash; Yielding Open-Source Health Information</p>
  </footer>

  <script src="/javascript/app.js"></script>
</body>
</html>
