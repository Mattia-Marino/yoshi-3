name: "YOSHI-3"

services:
  generator:
    build:
      context: .
      dockerfile: generator.Dockerfile
    volumes:
      - .:/workspace

  python:
    build:
      context: ./python
    image: yoshi-py
    container_name: YOSHI-3-python
    ports:
      - "50051:50051"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      generator:
        condition: service_completed_successfully

  go:
    build:
      context: .
      dockerfile: go/Dockerfile
      args:
        # forwards build-arg if present; empty otherwise
        YOSHI_GH_TOKEN: ${YOSHI_GH_TOKEN:-}
    image: yoshi-go
    container_name: YOSHI-3-go
    ports:
      - "6001:6001"
    environment:
      - YOSHI_GH_TOKEN=${YOSHI_GH_TOKEN}
      - GRPC_ADDRESS=python:50051
    depends_on:
      - python
